# ETCRegionGenerator Configuration
# Folia-native region pre-generator

generation:
  # Maximum number of chunk generation requests active at the same time.
  # The feed loop blocks when this limit is reached and resumes as region
  # threads finish each chunk — no fixed sleep, pure semaphore control.
  #
  # Tuning guide:
  #   low-end box (2-4 cores) : 8  – 16
  #   mid-range   (6-8 cores) : 16 – 32   ← default
  #   high-end   (12+ cores)  : 32 – 64
  #
  # Raise this if generation feels slow; lower it if you see TPS drops.
  max-concurrent-chunks: 24

  # Optional delay (milliseconds) inserted between each chunk submission.
  # 0 = disabled (recommended — lets `max-concurrent-chunks` do all throttling).
  # Set to e.g. 5 only if you have very low TPS during generation.
  tick-delay-ms: 0

  # Whether to skip chunks that already exist in a region file.
  # Set to false to force re-generation (useful after terrain/datapack changes).
  skip-existing: true

  # Auto-save progress to disk so generation can resume after a restart.
  auto-save-progress: true

  # How often (in seconds) progress is written to disk.
  auto-save-interval: 30

messages:
  # Use MiniMessage format (https://docs.advntr.dev/minimessage)
  prefix: "<dark_gray>[<gradient:#00e0ff:#00ff99>ETC<white>RGen</gradient>]</dark_gray> "
  progress-broadcast-interval: 60   # seconds between automatic progress broadcasts (0 = disabled)
